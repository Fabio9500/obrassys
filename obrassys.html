<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ObrasSys</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--sur:#161b22;--card:#1c2433;--bor:#30363d;--acc:#f97316;--grn:#2ea043;--red:#da3633;--blu:#58a6ff;--pur:#bc8cff;--txt:#e6edf3;--mut:#8b949e;--r:8px}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--bor);border-radius:3px}
input,select,textarea{background:var(--bg);color:var(--txt);border:1px solid var(--bor);border-radius:var(--r);padding:7px 10px;font-size:13px;outline:none;width:100%;transition:border-color .2s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
input::placeholder{color:var(--mut)}
input[type="date"]{color-scheme:dark}
input[type="date"]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:1;background-color:var(--acc);border-radius:4px;padding:3px;filter:invert(0)}
input[type="date"]::-webkit-calendar-picker-indicator:hover{background-color:#fb923c}
button{cursor:pointer;font-weight:700;border:none;border-radius:var(--r);transition:opacity .15s;font-family:inherit}
button:hover{opacity:.85}
table{border-collapse:collapse;width:100%;font-size:12px}
th{text-align:left;padding:7px 10px;color:var(--txt);font-weight:800;border-bottom:2px solid var(--acc);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
td{padding:7px 10px;border-bottom:1px solid #1e2530;vertical-align:middle}
tr:hover td{background:#1e2a3a22}
.card{background:var(--card);border:1px solid var(--bor);border-radius:var(--r);padding:16px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}
.tag{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.05em}
.tag-am{background:#f0a50022;color:#f0a500;border:1px solid #f0a50055}
.tag-vd{background:#2ea04322;color:#3fb950;border:1px solid #2ea04355}
.tag-vm{background:#da363322;color:#f85149;border:1px solid #da363355}
.tag-az{background:#58a6ff22;color:var(--blu);border:1px solid #58a6ff55}
.tag-cz{background:#30363d33;color:var(--mut);border:1px solid var(--bor)}
.tag-la{background:#f9731622;color:var(--acc);border:1px solid #f9731655}
.erro{background:#da363322;border:1px solid var(--red);border-radius:8px;padding:10px 14px;margin-bottom:12px;color:var(--red);font-weight:700;font-size:13px;display:none}
.erro.vis{display:flex;justify-content:space-between;align-items:center}
.overlay{position:fixed;inset:0;background:#000a;z-index:999;display:none;align-items:center;justify-content:center;padding:12px}
.overlay.vis{display:flex}
.modal{background:var(--card);border:1px solid var(--bor);border-radius:12px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
.modal-head{padding:13px 16px;border-bottom:1px solid var(--bor);display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px}
.modal-body{padding:16px}
.campo{margin-bottom:10px}
.campo label{display:block;font-size:10px;color:var(--mut);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.prev{background:var(--bg);border:1px solid var(--bor);border-radius:6px;padding:8px 12px;margin-bottom:10px;display:flex;gap:20px;flex-wrap:wrap;font-size:12px}
#navbar{background:var(--sur);border-bottom:1px solid var(--bor);padding:0 16px;display:flex;align-items:center;gap:10px;height:50px;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:800;color:var(--acc);white-space:nowrap}
.tabs{display:flex;gap:3px;overflow-x:auto;flex:1}
.tab{background:transparent;color:var(--mut);border:none;border-radius:6px;padding:5px 11px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer}
.tab.ativo{background:var(--acc);color:#000}
#main{padding:18px;max-width:1300px;margin:0 auto}
.titulo{font-weight:800;font-size:17px;margin-bottom:14px}
.titulo.acc{color:var(--acc)}
.kpis{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.kpi{flex:1 1 150px;min-width:140px}
.kpi-l{font-size:10px;color:var(--mut);text-transform:uppercase;margin-bottom:5px;letter-spacing:.07em}
.kpi-v{font-size:20px;font-weight:800}
.kpi-s{font-size:11px;color:var(--mut);margin-top:2px}
.alerta{border-radius:8px;padding:9px 14px;margin-bottom:8px;font-weight:700;font-size:13px}
.av{background:#da363322;border:1px solid var(--red);color:var(--red)}
.aa{background:#f0a50022;border:1px solid #f0a500;color:#f0a500}
.trow td{font-weight:700;background:var(--bg)}
#status{position:fixed;bottom:16px;right:16px;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;display:none;z-index:200}
#tela-loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spin{width:40px;height:40px;border:3px solid var(--bor);border-top-color:var(--acc);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#tela-token{position:fixed;inset:0;background:var(--bg);z-index:9998;display:none;align-items:center;justify-content:center;padding:20px}
@media print{#navbar,.no-print,#status,#fab-buttons{display:none!important}#main{padding:0;max-width:none}}
#fab-buttons{position:fixed;bottom:70px;right:16px;display:flex;flex-direction:column;gap:10px;z-index:300}
.fab{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px #0006;transition:transform .15s,opacity .15s;font-family:inherit}
.fab:hover{transform:scale(1.1);opacity:.95}
.fab-dash{background:var(--acc);color:#000}
.fab-back{background:var(--sur);color:var(--txt);border:1px solid var(--bor)}
.fab-tooltip{position:absolute;right:58px;background:#111;color:#fff;padding:4px 10px;border-radius:6px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;top:50%;transform:translateY(-50%)}
.fab:hover .fab-tooltip{opacity:1}
.itens-tabela{margin:8px 0;font-size:12px}
.mini-input{width:70px!important;padding:4px 6px!important;font-size:12px!important}
</style>
</head>
<body>

<div id="tela-loading">
  <div style="font-size:32px">🏗️</div>
  <div style="font-weight:800;font-size:20px;color:var(--acc)">ObrasSys</div>
  <div style="font-size:11px;color:var(--mut);margin-bottom:8px" id="load-versao"></div>
  <div class="spin"></div>
  <div style="color:var(--mut);font-size:13px" id="load-msg">Carregando...</div>
</div>

<div id="tela-token">
  <div class="card" style="max-width:480px;width:100%;padding:32px;text-align:center">
    <div style="font-size:40px;margin-bottom:12px">🔐</div>
    <div style="font-weight:800;font-size:20px;color:var(--acc);margin-bottom:4px">ObrasSys</div>
    <div id="login-versao" style="font-size:11px;color:var(--mut);margin-bottom:14px"></div>
    <p style="color:var(--mut);font-size:13px;margin-bottom:24px;line-height:1.6">
      Informe seu <strong style="color:var(--txt)">Token do GitHub</strong> para conectar.<br>
      Será salvo neste dispositivo — não precisa informar de novo.
    </p>
    <div class="campo" style="text-align:left;margin-bottom:16px">
      <label>Token do GitHub</label>
      <input id="inp-token" type="password" placeholder="github_pat_..." onkeydown="if(event.key==='Enter')entrar()"/>
    </div>
    <button type="button" onclick="entrar()"
      style="background:var(--acc);color:#000;padding:10px 28px;font-size:14px;font-family:'Segoe UI',sans-serif;font-weight:800;border:none;border-radius:var(--r);cursor:pointer;width:100%;margin-bottom:10px">
      ✅ Conectar e Entrar
    </button>
    <div id="err-token" style="color:var(--red);font-size:12px;display:none">Token inválido ou sem conexão. Verifique e tente novamente.</div>
  </div>
</div>

<div id="navbar" style="display:none">
  <div class="logo">🏗️ ObrasSys <span id="nav-versao" style="font-size:10px;color:var(--mut);font-weight:400;margin-left:2px"></span></div>
  <div class="tabs" id="tabs"></div>
  <div id="nav-usuario-info" style="display:flex;align-items:center;gap:8px;flex-shrink:0">
    <div id="nav-usu-badge" style="display:none;align-items:center;gap:6px">
      <div id="nav-usu-avatar" style="width:28px;height:28px;border-radius:50%;background:var(--acc);color:#000;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center"></div>
      <div style="font-size:11px;line-height:1.2">
        <div id="nav-usu-nome" style="font-weight:700;color:var(--txt)"></div>
        <div id="nav-usu-perfil" style="color:var(--mut);font-size:10px"></div>
      </div>
      <button type="button" onclick="sairUsuario()" title="Trocar usuário" style="background:transparent;color:var(--mut);font-size:11px;padding:3px 7px;border:1px solid var(--bor);border-radius:var(--r);cursor:pointer;font-family:inherit">↩ Sair</button>
    </div>
    <button type="button" onclick="desconectar()" style="background:transparent;color:var(--mut);font-size:11px;padding:4px 8px;border:1px solid var(--bor);" title="Trocar token">⚙</button>
  </div>
</div>
<div id="main" style="display:none"></div>
<div id="status"></div>

<div id="tela-usuario" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9997;align-items:center;justify-content:center;padding:20px">
  <div class="card" style="max-width:400px;width:100%;padding:32px;text-align:center">
    <div style="font-size:40px;margin-bottom:8px">🏗️</div>
    <div style="font-weight:800;font-size:20px;color:var(--acc);margin-bottom:2px">ObrasSys</div>
    <div id="telausu-versao" style="font-size:10px;color:var(--mut);margin-bottom:20px"></div>
    <div id="telausu-e1">
      <div style="font-size:13px;color:var(--mut);font-weight:600;margin-bottom:14px">Quem está acessando?</div>
      <div id="lista-usuarios-login" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>
    <div id="telausu-e2" style="display:none">
      <div id="telausu-nome-sel" style="font-weight:700;font-size:16px;color:var(--acc);margin-bottom:16px"></div>
      <div class="campo" style="text-align:left;margin-bottom:10px">
        <label>Senha</label>
        <input type="password" id="senha-login-usu" placeholder="Digite sua senha" onkeydown="if(event.key==='Enter')loginUsuario()"/>
      </div>
      <div id="err-login-usu" style="color:var(--red);font-size:12px;margin-bottom:10px;display:none">Senha incorreta. Tente novamente.</div>
      <div style="display:flex;gap:8px">
        <button type="button" onclick="loginUsuario()" style="flex:1;background:var(--acc);color:#000;padding:10px;font-weight:800;border:none;border-radius:var(--r);cursor:pointer;font-family:inherit;font-size:13px">✅ Entrar</button>
        <button type="button" onclick="voltarEscolhaUsuario()" style="background:var(--sur);color:var(--txt);padding:10px 16px;border:none;border-radius:var(--r);cursor:pointer;font-family:inherit">← Voltar</button>
      </div>
    </div>
  </div>
</div>
<div class="overlay" id="ov">
  <div class="modal">
    <div class="modal-head"><span id="m-titulo"></span>
      <button type="button" onclick="FM()" style="background:var(--bor);color:var(--txt);padding:3px 9px;font-size:11px">✕</button>
    </div>
    <div class="modal-body" id="m-corpo"></div>
  </div>
</div>
<div class="overlay" id="ov-cf">
  <div class="card" style="max-width:360px;width:100%;text-align:center;padding:24px">
    <div style="font-size:14px;font-weight:700;margin-bottom:20px" id="cf-msg"></div>
    <div class="row" style="justify-content:center;gap:10px">
      <button type="button" id="cf-sim" style="background:var(--red);color:#fff;padding:8px 18px">Sim, confirmar</button>
      <button type="button" onclick="FCF()" style="background:var(--sur);color:var(--txt);padding:8px 18px">Cancelar</button>
    </div>
  </div>
</div>

<div id="fab-buttons" class="no-print" style="display:none">
  <div style="position:relative">
    <button type="button" class="fab fab-dash" onclick="irPara('dashboard')" title="Dashboard">📊<span class="fab-tooltip">Dashboard</span></button>
  </div>
  <div style="position:relative">
    <button type="button" class="fab fab-back" onclick="voltarPagina()" title="Voltar" style="display:none">◀<span class="fab-tooltip">Voltar</span></button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// GITHUB CONFIG
// ══════════════════════════════════════════
const GH_USER = 'Fabio9500';
const GH_REPO = 'obrassys';
const GH_FILE = 'dados.json';
const GH_API  = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;

function getToken(){ return localStorage.getItem('obs_gh_token') || ''; }
function setToken(t){ localStorage.setItem('obs_gh_token', t); }

let _sha = null;
let _shaAtual = null;

// ══════════════════════════════════════════
// MODO OFFLINE — FILA DE SINCRONIZAÇÃO
// ══════════════════════════════════════════
function getFilaPendente(){ try{ return JSON.parse(localStorage.getItem('obs_fila')||'null'); }catch(e){ return null; } }
function setFilaPendente(db){ try{ localStorage.setItem('obs_fila', JSON.stringify(db)); }catch(e){} }
function limparFilaPendente(){ localStorage.removeItem('obs_fila'); }
function getUltimoSha(){ return localStorage.getItem('obs_last_sha') || ''; }
function setUltimoSha(sha){ if(sha) localStorage.setItem('obs_last_sha', sha); }

let _online = navigator.onLine;
let _sincronizando = false;
function isOnline(){ return navigator.onLine; }

async function ghCarregar(){
  try{
    setStatus('saving','🔄 Carregando...');
    const r = await fetch(GH_API, { headers:{ 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github.v3+json' } });
    if(r.status === 401 || r.status === 403) return null;
    if(r.status === 404){ setStatus('ok','✅ Pronto'); return dbVazio(); }
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    _sha = j.sha;
    setUltimoSha(j.sha);
    let dados;
    if(!j.content || j.content.trim() === ''){
      setStatus('saving','🔄 Arquivo grande — carregando via download...');
      const r2 = await fetch(j.download_url);
      if(!r2.ok) throw new Error('Download falhou: '+r2.status);
      dados = await r2.json();
    } else {
      dados = JSON.parse(atob(j.content.replace(/\n/g,'')));
    }
    try{ localStorage.setItem('obs_bkp', JSON.stringify(dados)); }catch(e){}
    const fila = getFilaPendente();
    if(fila){ setStatus('warn','📤 Sincronizando alterações offline...'); return await resolverFilaPendente(fila, dados, j.sha); }
    setStatus('ok','✅ Dados carregados');
    setTimeout(()=>{ document.getElementById('status').style.display='none'; },3000);
    return dados;
  }catch(e){
    const bkp = localStorage.getItem('obs_bkp');
    if(bkp){ setStatus('warn','📴 Offline — usando dados locais'); return JSON.parse(bkp); }
    setStatus('warn','⚠ Sem dados');
    return dbVazio();
  }
}

async function resolverFilaPendente(filaDb, dadosRemotos, shaRemotoAtual){
  const shaQuandoFicouOffline = getUltimoSha();
  if(!shaQuandoFicouOffline || shaQuandoFicouOffline === shaRemotoAtual){
    limparFilaPendente();
    await ghSalvar(filaDb);
    setStatus('ok','✅ Alterações offline sincronizadas');
    setTimeout(()=>{ document.getElementById('status').style.display='none'; },4000);
    return filaDb;
  }
  mostrarConflitoSync(filaDb, dadosRemotos);
  return dadosRemotos;
}

function mostrarConflitoSync(filaDb, dadosRemotos){
  AM('⚠️ Conflito de Sincronização', `
    <div style="background:#da363322;border:1px solid var(--red);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px;line-height:1.5">
      Você tem alterações feitas <strong>offline neste dispositivo</strong> que ainda não foram salvas na nuvem.<br><br>
      Porém, <strong>outro dispositivo já salvou alterações diferentes</strong> no sistema enquanto você estava sem conexão.<br><br>
      Escolha como deseja prosseguir:
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${B('☁️ Manter dados da nuvem (descarta minhas alterações offline)','aplicarResolucaoConflito(&quot;nuvem&quot;)','var(--blu)','#fff')}
      ${B('💾 Usar minhas alterações offline (sobrescreve a nuvem)','aplicarResolucaoConflito(&quot;local&quot;)','var(--acc)','#000')}
    </div>
    <div style="margin-top:14px;font-size:11px;color:var(--mut)">
      Dica: se não tiver certeza, escolha "Manter dados da nuvem" e refaça manualmente as alterações que fez offline, conferindo o que já está salvo.
    </div>
  `);
  window._conflitoFilaDb = filaDb;
  window._conflitoDadosRemotos = dadosRemotos;
}

async function aplicarResolucaoConflito(opcao){
  FM();
  if(opcao==='nuvem'){
    limparFilaPendente();
    DB = window._conflitoDadosRemotos;
    setStatus('ok','☁️ Dados da nuvem mantidos');
  } else {
    limparFilaPendente();
    await ghSalvar(window._conflitoFilaDb);
    DB = window._conflitoFilaDb;
    setStatus('ok','✅ Suas alterações offline foram salvas');
  }
  delete window._conflitoFilaDb;
  delete window._conflitoDadosRemotos;
  renderAba();
  setTimeout(()=>{ document.getElementById('status').style.display='none'; },4000);
}

async function ghSalvar(db){
  try{ localStorage.setItem('obs_bkp', JSON.stringify(db)); }catch(e){}
  if(!isOnline()){
    setFilaPendente(db);
    setStatus('warn','📴 Offline — alteração salva neste dispositivo');
    setTimeout(()=>{ document.getElementById('status').style.display='none'; },4000);
    return;
  }
  setStatus('saving','⏳ Salvando...');
  try{
    const rGet = await fetch(GH_API, { headers:{ 'Authorization':`token ${getToken()}`, 'Accept':'application/vnd.github.v3+json' } });
    if(rGet.ok){ const jGet = await rGet.json(); _sha = jGet.sha; _shaAtual = jGet.sha; }
    const conteudo = btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2))));
    const body = { message:'ObrasSys update', content: conteudo, sha: _sha };
    const r = await fetch(GH_API, {
      method:'PUT',
      headers:{ 'Authorization':`token ${getToken()}`, 'Accept':'application/vnd.github.v3+json', 'Content-Type':'application/json' },
      body: JSON.stringify(body)
    });
    const res = await r.json();
    if(res.content && res.content.sha){
      _sha = res.content.sha; _shaAtual = res.content.sha;
      setUltimoSha(res.content.sha);
      limparFilaPendente();
      setStatus('ok','✅ Salvo na nuvem');
    } else {
      setFilaPendente(db);
      setStatus('err','⚠ Erro ao salvar — guardado localmente');
    }
    setTimeout(()=>{ document.getElementById('status').style.display='none'; },3000);
  }catch(e){
    setFilaPendente(db);
    setStatus('warn','📴 Sem conexão — alteração salva neste dispositivo');
    setTimeout(()=>{ document.getElementById('status').style.display='none'; },5000);
  }
}

window.addEventListener('online', async ()=>{
  _online = true;
  const fila = getFilaPendente();
  if(fila && !_sincronizando){
    _sincronizando = true;
    setStatus('warn','🔄 Conexão recuperada — verificando sincronização...');
    try{
      const r = await fetch(GH_API, { headers:{ 'Authorization':`token ${getToken()}`, 'Accept':'application/vnd.github.v3+json' } });
      if(r.ok){
        const j = await r.json();
        const dadosRemotos = JSON.parse(atob(j.content.replace(/\n/g,'')));
        await resolverFilaPendente(fila, dadosRemotos, j.sha);
        if(!window._conflitoFilaDb){ renderAba(); }
      }
    }catch(e){ }
    _sincronizando = false;
  }
});
window.addEventListener('offline', ()=>{
  _online = false;
  setStatus('warn','📴 Você está offline — alterações serão salvas neste dispositivo');
  setTimeout(()=>{ document.getElementById('status').style.display='none'; },4000);
});

function setStatus(tipo,msg){
  const el=document.getElementById('status');
  const s={saving:'background:#f9731622;color:var(--acc);border:1px solid #f9731655',
    ok:'background:#2ea04322;color:#3fb950;border:1px solid #2ea04355',
    warn:'background:#f0a50022;color:#f0a500;border:1px solid #f0a50055',
    err:'background:#da363322;color:#f85149;border:1px solid #da363355'};
  el.style.cssText='display:block;position:fixed;bottom:16px;right:16px;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;z-index:200;'+s[tipo];
  el.textContent=msg;
}

function atualizarIndicadorConexao(){
  let ind = document.getElementById('conn-indicator');
  if(!ind){
    ind = document.createElement('div');
    ind.id = 'conn-indicator';
    ind.style.cssText = 'position:fixed;top:8px;right:12px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;z-index:250;display:none';
    document.body.appendChild(ind);
  }
  const fila = getFilaPendente();
  if(!isOnline()){
    ind.style.display='block';
    ind.style.cssText += 'background:#da363322;color:#f85149;border:1px solid #da363355';

// Validação de CPF/CNPJ por dígito verificador (algoritmo módulo 11)
function validarCpfCnpj(doc){
  const v = String(doc||'').replace(/\D/g,'');
  if(!v) return true;
  if(v.length===11) return validarCPF(v);
  if(v.length===14) return validarCNPJ(v);
  return false;
}
function validarCPF(v){
  if(/^(\d)\1{10}$/.test(v)) return false;
  let soma=0; for(let i=0;i<9;i++) soma+=Number(v[i])*(10-i);
  let dv1=(soma*10)%11; if(dv1===10) dv1=0;
  if(dv1!==Number(v[9])) return false;
  soma=0; for(let i=0;i<10;i++) soma+=Number(v[i])*(11-i);
  let dv2=(soma*10)%11; if(dv2===10) dv2=0;
  return dv2===Number(v[10]);
}
function validarCNPJ(v){
  if(/^(\d)\1{13}$/.test(v)) return false;
  const calc = (base) => {
    const pesos = base.length===12 ? [5,4,3,2,9,8,7,6,5,4,3,2] : [6,5,4,3,2,9,8,7,6,5,4,3,2];
    let soma=0; for(let i=0;i<base.length;i++) soma+=Number(base[i])*pesos[i];
    const r = soma%11; return r<2?0:11-r;
  };
  const dv1 = calc(v.slice(0,12));
  if(dv1!==Number(v[12])) return false;
  const dv2 = calc(v.slice(0,13));
  return dv2===Number(v[13]);
}

}

const BIO_KEY_OBS = 'obs_bio';

async function bioDisponivel(){
  try{ return !!(window.PublicKeyCredential && await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()); }
  catch(e){ return false; }
}
function _bioB64ToArr(b64){ return Uint8Array.from(atob(b64), c=>c.charCodeAt(0)); }
function _bioArrToB64(arr){ return btoa(String.fromCharCode(...new Uint8Array(arr))); }

async function registrarBioObs(userId){
  const u = (DB.usuarios||[]).find(x=>x.id===userId); if(!u) return false;
  try{
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const cred = await navigator.credentials.create({publicKey:{
      challenge,
      rp:{ name:'ObrasSys', id: location.hostname||'localhost' },
      user:{ id: new TextEncoder().encode(userId), name: u.login||u.nome, displayName: u.nome },
      pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
      authenticatorSelection:{ authenticatorAttachment:'platform', userVerification:'required' },
      timeout: 60000
    }});
    localStorage.setItem(BIO_KEY_OBS, JSON.stringify({credId: _bioArrToB64(cred.rawId), userId}));
    return true;
  }catch(e){
    if(e.name!=='NotAllowedError') console.warn('WebAuthn register:',e);
    return false;
  }
}

async function entrarComBioObs(){
  const stored = localStorage.getItem(BIO_KEY_OBS); if(!stored) return;
  const {credId, userId} = JSON.parse(stored);
  const u = (DB.usuarios||[]).find(x=>x.id===userId&&x.ativo!==false); if(!u) return;
  const btnBio = document.getElementById('btn-bio-obs');
  if(btnBio){ btnBio.disabled=true; btnBio.textContent='⏳ Aguardando...'; }
  try{
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    await navigator.credentials.get({publicKey:{
      challenge,
      allowCredentials:[{id:_bioB64ToArr(credId),type:'public-key',transports:['internal']}],
      userVerification:'required',
      timeout:60000
    }});
    USUARIO_ATUAL = {id:u.id,nome:u.nome,perfil:u.perfil};
    sessionStorage.setItem('obs_usu',JSON.stringify(USUARIO_ATUAL));
    document.getElementById('tela-usuario').style.display='none';

    iniciarApp();
  }catch(e){
    if(btnBio){btnBio.disabled=false;btnBio.textContent='🔒 Entrar com Face ID / Touch ID';}
    if(e.name!=='NotAllowedError') console.warn('WebAuthn auth:',e);
  }
}

async function backupGitHub(silencioso){
  if(!getToken()||!isOnline()) return false;
  try{
    const agora = new Date();
    const ts = agora.toISOString().slice(0,16).replace('T','_').replace(/:/g,'-');
    const nomeArq = `backups/backup_${ts}.json`;
    const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${nomeArq}`;
    const conteudo = btoa(unescape(encodeURIComponent(JSON.stringify(DB,null,2))));
    const r = await fetch(url,{
      method:'PUT',
      headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:`Backup ${ts}`,content:conteudo})
    });
    if(r.ok){
      try{ localStorage.setItem('obs_ultimo_bkp', new Date().toLocaleString('pt-BR')); }catch(e){}
      if(!silencioso){ setStatus('ok','☁️ Backup salvo no GitHub!'); setTimeout(()=>{document.getElementById('status').style.display='none';},4000); }
      return true;
    }
  }catch(e){}
  if(!silencioso){ setStatus('err','⚠ Erro ao salvar backup no GitHub'); setTimeout(()=>{document.getElementById('status').style.display='none';},4000); }
  return false;
}

function backupLocal(){
  const ts = new Date().toISOString().slice(0,16).replace('T','_').replace(/:/g,'-');
  const nomeArq = `ObrasSys_backup_${ts}.json`;
  const blob = new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=nomeArq; a.click();
  URL.revokeObjectURL(url);
  try{ localStorage.setItem('obs_ultimo_bkp', new Date().toLocaleString('pt-BR')); }catch(e){}
  setStatus('ok',`💾 Backup baixado: ${nomeArq}`);
  setTimeout(()=>{document.getElementById('status').style.display='none';},4000);
}

async function verificarAtualizacaoRemota(){
  if(_sincronizando || !getToken() || !isOnline()) return;
  try{
    const r = await fetch(GH_API, { headers:{ 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github.v3+json' } });
    if(!r.ok) return;
    const j = await r.json();
    const shaRemoto = j.sha;
    if(!_shaAtual){ _shaAtual = shaRemoto; _sha = shaRemoto; return; }
    if(shaRemoto === _shaAtual) return;
    if(shaRemoto !== _shaAtual){
      _shaAtual = shaRemoto; _sha = shaRemoto;
      setUltimoSha(shaRemoto);
      let novosDados;
      if(!j.content || j.content.trim() === ''){
        const r2 = await fetch(j.download_url);
        if(!r2.ok) return;
        novosDados = await r2.json();
      } else {
        novosDados = JSON.parse(atob(j.content.replace(/\n/g,'')));
      }
      try{ localStorage.setItem('obs_bkp', JSON.stringify(novosDados)); }catch(e){}
      DB = novosDados;
      renderAba();
      setStatus('ok', '🔄 Dados atualizados de outro dispositivo');
      setTimeout(()=>{ document.getElementById('status').style.display='none'; }, 4000);
    }
  }catch(e){ }
}

              const uAtivo = (DB.usuarios||[]).find(u=>u.id===s.id&&u.ativo!==false);
              if(uAtivo){ USUARIO_ATUAL=s; atualizarNavUsuario(); iniciarApp(); return; }
            }catch(e){}
          }
          document.getElementById('tela-loading').style.display='none';
          mostrarTelaUsuario();
          return;
        }
      }catch(e){}
    }
    document.getElementById('tela-loading').style.display='none';
    document.getElementById('tela-token').style.display='flex';
    const el = document.getElementById('err-token');
    el.textContent = '📴 Sem internet e sem dados salvos neste dispositivo ainda. Conecte-se à internet para carregar o sistema pela primeira vez.';
    el.style.display = 'block';
    return;
  }

  document.getElementById('load-msg').textContent='Carregando dados...';
  const dados = await ghCarregar();
  if(dados === null){
    localStorage.removeItem('obs_gh_token');
    document.getElementById('tela-loading').style.display='none';
    document.getElementById('tela-token').style.display='flex';
    document.getElementById('err-token').style.display='block';
    return;
  }
  DB = dados;
  await seedInicial();
  const _sessaoInit = sessionStorage.getItem('obs_usu');
  if(_sessaoInit){
    try{
      const s = JSON.parse(_sessaoInit);
      const uAtivo = (DB.usuarios||[]).find(u=>u.id===s.id&&u.ativo!==false);
      if(uAtivo){ USUARIO_ATUAL=s; atualizarNavUsuario(); iniciarApp(); return; }
    }catch(e){}
    sessionStorage.removeItem('obs_usu');
  }
  document.getElementById('tela-loading').style.display='none';
  mostrarTelaUsuario();
})();

function totalItensObra(obra){
  return (obra.itens||[]).reduce((s,it)=>s+Number(it.quantidade||0)*Number(it.precoUnitario||0),0);
}
function totalCustosObra(obra){
  return (obra.custos||[]).reduce((s,c)=>s+Number(c.valor||0),0);
}

  const faturado = obra.faturaId ? (faturaById(obra.faturaId)?.valorTotal||0) : totalItensObra(obra);

// ── Gerar Fatura ──
function gerarFatura(obraId){
  const o = obraById(obraId); if(!o) return;
  if(!o.itens||o.itens.length===0){ AM('⚠ Sem Itens',`<div style="font-size:13px;color:var(--mut)">Adicione ao menos um item ao orçamento antes de gerar a fatura.</div><div style="margin-top:14px">${B('Entendi','FM()','var(--sur)','var(--txt)')}</div>`); return; }
  CF('Gerar fatura para esta obra? Os itens do orçamento serão copiados para a fatura.', ()=>{
    const numero = String((DB.faturas||[]).length+1).padStart(4,'0');
    const fatura = {
      id:uid(), obraId, clienteId:o.clienteId, numero,
      dataEmissao: hoje(),
      itens: JSON.parse(JSON.stringify(o.itens)),
      valorTotal: totalItensObra(o),
      status:'emitida', obs:'',
      criadoEm: new Date().toISOString()
    };
    salvar({
      ...DB,
      faturas:[...(DB.faturas||[]), fatura],
      obras:(DB.obras||[]).map(x=>x.id===obraId?{...x,faturaId:fatura.id}:x)
    });
  });
}
function cancelarFatura(id){
  const f = faturaById(id); if(!f) return;
  CF('Cancelar esta fatura? A obra poderá gerar uma nova fatura em seguida.', ()=>{
    salvar({
      ...DB,
      faturas:(DB.faturas||[]).map(x=>x.id===id?{...x,status:'cancelada'}:x),
      obras:(DB.obras||[]).map(o=>o.faturaId===id?{...o,faturaId:null}:o)
    });
    FM();
  });
}
function verFatura(id){
  const f = faturaById(id); if(!f) return;
  const cli = clienteById(f.clienteId);
  const o = obraById(f.obraId);
  const linhasItens = (f.itens||[]).map(it=>{
    const prod = produtoById(it.produtoId);
    return `<tr><td>${esc(it.descricao)}</td><td>${esc(prod?LABELS_UNIDADE[prod.unidade]:'-')}</td><td style="text-align:right">${it.quantidade}</td><td style="text-align:right">R$ ${fmt(it.precoUnitario)}</td><td style="text-align:right;font-weight:700">R$ ${fmt(it.quantidade*it.precoUnitario)}</td></tr>`;
  }).join('');
  AM('🧾 Fatura Nº '+f.numero,`
    <div class="prev">
      <div>Cliente: <strong>${esc(cli?cli.nome:'-')}</strong></div>
      <div>Emissão: <strong>${fmtD(f.dataEmissao)}</strong></div>
      <div>Status: ${T(f.status==='emitida'?'Emitida':'Cancelada', f.status==='emitida'?'vd':'cz')}</div>
    </div>
    ${o?`<div style="font-size:12px;color:var(--mut);margin-bottom:10px">Obra: ${esc(o.escopo)}</div>`:''}
    <table><thead><tr><th>Item</th><th>Un.</th><th style="text-align:right">Qtd</th><th style="text-align:right">Preço Unit.</th><th style="text-align:right">Subtotal</th></tr></thead><tbody>${linhasItens}</tbody></table>
    <div style="text-align:right;font-size:18px;font-weight:800;color:var(--acc);margin-top:10px">Total: R$ ${fmt(f.valorTotal)}</div>
    <div style="display:flex;gap:8px;margin-top:14px">
      ${B('🖨 Imprimir','window.print()','var(--blu)','#fff')}
      ${f.status==='emitida'?BPerm('excluir','🚫 Cancelar Fatura','cancelarFatura(\''+id+'\')','var(--red)','#fff'):''}
      ${B('Fechar','FM()','var(--sur)','var(--txt)')}
    </div>
  `);
}

function htmlDashboard(){

  `;
}

// RENDER — RELATÓRIOS
// ══════════════════════════════════════════
function htmlRelatorios(){
  const obrasValidas = (DB.obras||[]).filter(o=>o.status!=='cancelada');

  // Margem por obra
  const linhasMargem = obrasValidas.slice().sort((a,b)=>margemObra(b)-margemObra(a)).map(o=>{
    const cli = clienteById(o.clienteId);
    const margem = margemObra(o);
    return `<tr><td>${esc(cli?cli.nome:'-')}</td><td>${esc(o.escopo.slice(0,40))}${o.escopo.length>40?'…':''}</td><td style="text-align:right">R$ ${fmt(totalItensObra(o))}</td><td style="text-align:right">R$ ${fmt(totalCustosObra(o))}</td><td style="text-align:right;font-weight:700;color:${margem<0?'#f85149':'#3fb950'}">R$ ${fmt(margem)}</td></tr>`;
  }).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--mut)">Nenhuma obra ainda</td></tr>';

  // Faturamento por Cliente
  const porCliente = {};
  (DB.faturas||[]).filter(f=>f.status==='emitida').forEach(f=>{
    const cli = clienteById(f.clienteId);
    const nome = cli?cli.nome:'(cliente removido)';
    porCliente[nome] = (porCliente[nome]||0) + f.valorTotal;
  });
  const linhasCliente = Object.entries(porCliente).sort((a,b)=>b[1]-a[1]).map(([nome,total])=>
    `<tr><td>${esc(nome)}</td><td style="text-align:right;font-weight:700">R$ ${fmt(total)}</td></tr>`
  ).join('') || '<tr><td colspan="2" style="text-align:center;color:var(--mut)">Nenhuma fatura emitida ainda</td></tr>';

  // Custos por categoria (tipo)
  const porTipoCusto = {};
  obrasValidas.forEach(o=>(o.custos||[]).forEach(c=>{
    const nome = LABELS_TIPO_CUSTO[c.tipo]||c.tipo;
    porTipoCusto[nome] = (porTipoCusto[nome]||0) + Number(c.valor||0);
  }));
  const linhasTipoCusto = Object.entries(porTipoCusto).sort((a,b)=>b[1]-a[1]).map(([nome,total])=>
    `<tr><td>${esc(nome)}</td><td style="text-align:right;font-weight:700">R$ ${fmt(total)}</td></tr>`
  ).join('') || '<tr><td colspan="2" style="text-align:center;color:var(--mut)">Nenhum custo lançado ainda</td></tr>';

  const totalFaturado = (DB.faturas||[]).filter(f=>f.status==='emitida').reduce((s,f)=>s+f.valorTotal,0);
  const totalCustosGeral = obrasValidas.reduce((s,o)=>s+totalCustosObra(o),0);

  return `
    <div class="titulo acc">📈 Relatórios</div>
    <div class="kpis">
      <div class="card kpi"><div class="kpi-l">Total Faturado</div><div class="kpi-v" style="color:var(--acc)">R$ ${fmt(totalFaturado)}</div></div>
      <div class="card kpi"><div class="kpi-l">Total de Custos</div><div class="kpi-v" style="color:#f85149">R$ ${fmt(totalCustosGeral)}</div></div>
      <div class="card kpi"><div class="kpi-l">Margem Geral</div><div class="kpi-v" style="color:${(totalFaturado-totalCustosGeral)<0?'var(--red)':'#3fb950'}">R$ ${fmt(totalFaturado-totalCustosGeral)}</div></div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="font-weight:700;margin-bottom:10px">🏗️ Margem por Obra</div>
      <table><thead><tr><th>Cliente</th><th>Escopo</th><th style="text-align:right">Orçado</th><th style="text-align:right">Custos</th><th style="text-align:right">Margem</th></tr></thead><tbody>${linhasMargem}</tbody></table>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="font-weight:700;margin-bottom:10px">👥 Faturamento por Cliente</div>
      <table><thead><tr><th>Cliente</th><th style="text-align:right">Total Faturado</th></tr></thead><tbody>${linhasCliente}</tbody></table>
    </div>
    <div class="card">
      <div style="font-weight:700;margin-bottom:10px">💰 Custos por Categoria</div>
      <table><thead><tr><th>Tipo</th><th style="text-align:right">Total</th></tr></thead><tbody>${linhasTipoCusto}</tbody></table>
    </div>
  `;
}

    `<button type="button" class="tab${sub===a.id?' ativo':''}" style="background:${sub===a.id?'var(--acc)':'var(--sur)'};color:${sub===a.id?'#000':'var(--txt)'};padding:6px 14px" onclick="irParaCadastro('${a.id}')">${a.r}</button>`
  ).join('')}</div>`;

  let corpo = '';
  if(sub==='clientes'){
    const linhas = (DB.clientes||[]).map(c=>`<tr>
      <td>${esc(c.nome)}</td><td>${esc(c.cpfCnpj||'-')}</td><td>${esc(c.telefone||'-')}</td><td>${esc(c.email||'-')}</td>
      <td>${B('✏','editarCliente(\''+c.id+'\')','var(--sur)','var(--txt)',1)}</td></tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--mut)">Nenhum cliente cadastrado</td></tr>';
    corpo = `
      <div class="row" style="margin-bottom:12px">${B('➕ Novo Cliente','novoCliente()','var(--acc)')}</div>
      <div class="card"><table><thead><tr><th>Nome</th><th>CPF/CNPJ</th><th>Telefone</th><th>E-mail</th><th></th></tr></thead><tbody>${linhas}</tbody></table></div>`;
  } else if(sub==='produtos'){
    const linhas = (DB.produtos||[]).map(p=>`<tr>
      <td>${esc(p.nome)}</td><td>${T(p.categoria,'la')}</td><td>${esc(LABELS_UNIDADE[p.unidade]||p.unidade)}</td><td style="text-align:right">R$ ${fmt(p.precoUnitario)}</td>
      <td>${B('✏','editarProduto(\''+p.id+'\')','var(--sur)','var(--txt)',1)}</td></tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--mut)">Nenhum produto/serviço cadastrado</td></tr>';
    corpo = `
      <div class="row" style="margin-bottom:12px">${B('➕ Novo Produto/Serviço','novoProduto()','var(--acc)')}</div>
      <div class="card"><table><thead><tr><th>Nome</th><th>Categoria</th><th>Unidade</th><th style="text-align:right">Preço Unit.</th><th></th></tr></thead><tbody>${linhas}</tbody></table></div>`;
  } else if(sub==='usuarios'){
    const linhas = (DB.usuarios||[]).map(u=>`<tr style="${u.ativo===false?'opacity:.5':''}">
      <td>${esc(u.nome)}</td><td>${esc(u.login)}</td><td>${T(LABELS_PERFIL[u.perfil]||u.perfil,u.perfil==='master'?'am':u.perfil==='operador'?'az':'cz')}</td>
      <td>${u.ativo===false?T('Inativo','cz'):T('Ativo','vd')}</td>
      <td>
        ${B('✏','editarUsuario(\''+u.id+'\')','var(--sur)','var(--txt)',1)}
        ${B('🔑','alterarSenhaUsuario(\''+u.id+'\')','var(--sur)','var(--txt)',1,'Alterar senha')}
        ${B(u.ativo===false?'↩':'⏸','toggleAtivoUsuario(\''+u.id+'\')','var(--sur)','var(--txt)',1,u.ativo===false?'Ativar':'Desativar')}
      </td></tr>`).join('');
    corpo = `
      <div class="row" style="margin-bottom:12px">${B('➕ Novo Usuário','novoUsuario()','var(--acc)')}</div>
      <div class="card"><table><thead><tr><th>Nome</th><th>Login</th><th>Perfil</th><th>Status</th><th>Ações</th></tr></thead><tbody>${linhas}</tbody></table></div>`;
  }

  return `<div class="titulo acc">🗂 Cadastros</div>${tabsHtml}${corpo}`;
}

// ── CRUD Usuários (Master/Operador/Consulta) ──
function novoUsuario(){
  AM('➕ Novo Usuário',`
    ${EH('e-usu')}
    <div class="row">
      ${C('Nome *',`<input id="usu-nome" placeholder="Nome completo">`,'2','160')}
      ${C('Login *',`<input id="usu-login" placeholder="login" style="text-transform:lowercase" oninput="this.value=this.value.toLowerCase()">`,'1','120')}
    </div>
    ${C('Perfil',`<select id="usu-perfil">
      <option value="operador">Operador</option>
      <option value="master">Master</option>
      <option value="consulta">Consulta (somente leitura)</option>
    </select>`,'1','200')}
    ${C('Senha *',`<input type="password" id="usu-senha" placeholder="Mínimo 4 caracteres">`,'1','160')}
    <div style="display:flex;gap:8px;margin-top:8px">
      ${B('✅ Criar Usuário','salvarNovoUsuario()','var(--grn)','#fff')}
      ${B('Cancelar','FM()','var(--sur)','var(--txt)')}
    </div>
  `);
}
async function salvarNovoUsuario(){
  const nome  = document.getElementById('usu-nome')?.value?.trim()||'';
  const login = document.getElementById('usu-login')?.value?.trim()||'';
  const perfil= document.getElementById('usu-perfil')?.value||'operador';
  const senha = document.getElementById('usu-senha')?.value||'';
  if(!nome)  { ME('e-usu','Informe o nome.'); return; }
  if(!login) { ME('e-usu','Informe o login.'); return; }
  if(senha.length<4){ ME('e-usu','Senha precisa ter ao menos 4 caracteres.'); return; }
  if((DB.usuarios||[]).find(u=>u.login===login)){ ME('e-usu','Este login já está em uso.'); return; }
  const hash = await hashSenha(senha);
  const novo = {id:uid(), nome, login, hash, perfil, ativo:true};
  salvar({...DB, usuarios:[...(DB.usuarios||[]),novo]});
  FM();
}
function editarUsuario(id){
  const u = (DB.usuarios||[]).find(x=>x.id===id); if(!u) return;
  AM('✏ Editar Usuário — '+esc(u.nome), `
    ${EH('e-usu-ed')}
    <div class="row">
      ${C('Nome *',`<input id="eusu-nome" value="${esc(u.nome)}">`,'2','160')}
      ${C('Login',`<input id="eusu-login" value="${esc(u.login||'')}" style="text-transform:lowercase" oninput="this.value=this.value.toLowerCase()">`,'1','120')}
    </div>
    ${C('Perfil',`<select id="eusu-perfil">
      <option value="operador"${u.perfil==='operador'?' selected':''}>Operador</option>
      <option value="master"${u.perfil==='master'?' selected':''}>Master</option>
      <option value="consulta"${u.perfil==='consulta'?' selected':''}>Consulta (somente leitura)</option>
    </select>`,'1','200')}
    <div style="display:flex;gap:8px;margin-top:8px">
      ${B('💾 Salvar','salvarEdicaoUsuario(\''+id+'\')' ,'var(--acc)')}
      ${B('Cancelar','FM()','var(--sur)','var(--txt)')}
    </div>
  `);
}
function salvarEdicaoUsuario(id){
  const nome  = document.getElementById('eusu-nome')?.value?.trim()||'';
  const login = document.getElementById('eusu-login')?.value?.trim()||'';
  const perfil= document.getElementById('eusu-perfil')?.value||'operador';
  if(!nome){ ME('e-usu-ed','Informe o nome.'); return; }
  const novoUsuarios = (DB.usuarios||[]).map(u=>u.id===id?{...u,nome,login,perfil}:u);
  salvar({...DB, usuarios:novoUsuarios});
  if(USUARIO_ATUAL?.id===id){ USUARIO_ATUAL={...USUARIO_ATUAL,nome,perfil}; sessionStorage.setItem('obs_usu',JSON.stringify(USUARIO_ATUAL)); atualizarNavUsuario(); }
  FM();
}
function alterarSenhaUsuario(id){
  const u = (DB.usuarios||[]).find(x=>x.id===id); if(!u) return;
  AM('🔑 Alterar Senha — '+esc(u.nome), `
    ${EH('e-senha-ed')}
    ${C('Nova Senha *',`<input type="password" id="nova-senha-usu" placeholder="Mínimo 4 caracteres">`,'1','180')}
    ${C('Confirmar Senha *',`<input type="password" id="nova-senha-usu2" placeholder="Repita a nova senha">`,'1','180')}
    <div style="display:flex;gap:8px;margin-top:8px">
      ${B('💾 Salvar Senha','salvarNovaSenhaUsuario(\''+id+'\')' ,'var(--acc)')}
      ${B('Cancelar','FM()','var(--sur)','var(--txt)')}
    </div>
  `);
}
async function salvarNovaSenhaUsuario(id){
  const s1 = document.getElementById('nova-senha-usu')?.value||'';
  const s2 = document.getElementById('nova-senha-usu2')?.value||'';
  if(s1.length<4){ ME('e-senha-ed','Senha precisa ter ao menos 4 caracteres.'); return; }
  if(s1!==s2)    { ME('e-senha-ed','As senhas não coincidem.'); return; }
  const hash = await hashSenha(s1);
  salvar({...DB, usuarios:(DB.usuarios||[]).map(u=>u.id===id?{...u,hash}:u)});
  FM();
}
function toggleAtivoUsuario(id){
  const u = (DB.usuarios||[]).find(x=>x.id===id); if(!u) return;
  const acao = u.ativo!==false ? 'desativar' : 'ativar';
  CF(`${acao.charAt(0).toUpperCase()+acao.slice(1)} o usuário ${u.nome}?`, ()=>{
    salvar({...DB, usuarios:(DB.usuarios||[]).map(x=>x.id===id?{...x,ativo:u.ativo===false}:x)});
  });
}

// PWA — SERVICE WORKER
// ══════════════════════════════════════════
let _swReg=null;
function registrarSW(){
  if(!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('./sw.js',{scope:'./'})
    .then(reg=>{
      _swReg=reg;
      reg.addEventListener('updatefound',()=>{
        const nSW=reg.installing;
        nSW.addEventListener('statechange',()=>{
          if(nSW.state==='installed'&&navigator.serviceWorker.controller) mostrarAtualizacaoSW();
        });
      });
    })
    .catch(err=>console.warn('[ObrasSys] SW não registrado:',err));
  navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload());
}
function mostrarAtualizacaoSW(){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;top:58px;left:50%;transform:translateX(-50%);background:var(--acc);color:#000;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:9999;cursor:pointer;box-shadow:0 4px 12px #0006;white-space:nowrap';
  el.innerHTML='🔄 Nova versão disponível — toque para atualizar';
  el.onclick=()=>{ if(_swReg&&_swReg.waiting)_swReg.waiting.postMessage('SKIP_WAITING'); el.remove(); };
  document.body.appendChild(el); setTimeout(()=>el.remove(),8000);
}
registrarSW();
